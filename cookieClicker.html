<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie Clicker</title>
</head>

<body>

  <h1>🍪 Cookie Clicker</h1>

  <button id="cookieButton">Click the Cookie!</button>

  <p>Cookies clicked: <span id="counter">0</span></p>

  <p id="message">Start clicking to earn cookies!</p>

<script>
  // Selects the cookie button from the HTML page.
  const cookieButton = document.getElementById("cookieButton");

  // Selects the counter display so it can be updated.
  const counter = document.getElementById("counter");

  // Selects the message area for displaying progress messages.
  const message = document.getElementById("message");

  // Stores the number of times the cookie has been clicked.
  let clickCount = 0;

  // Runs this function every time the cookie button is clicked.
  cookieButton.addEventListener("click", function() {

   // Increases the number of clicks by one.
   clickCount++;

   // Updates the number shown on the webpage.
   counter.textContent = clickCount;

   // Shows a different message at specific click milestones.
   if (clickCount === 10) {
        message.textContent = "🍪 You're just getting started!";
        document.body.style.backgroundColor = "#fff3cd";
    } else if (clickCount === 25) {
        message.textContent = "🔥 Wow, that's a lot of cookies!";
        document.body.style.backgroundColor = "#d1ecf1";
    } else if (clickCount === 50) {
        message.textContent = "😳 Are you still clicking?";
        document.body.style.backgroundColor = "#f8d7da";
    } else if (clickCount === 100) {
        message.textContent = "🏆 You win! Maybe take a break!";
        document.body.style.backgroundColor = "#d4edda";
    }
  });
</script>

</body>
</html>
